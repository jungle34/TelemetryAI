							</div>
						</form>						
					</div>
				</div>

<script>

	makeSanitazeSummary();

	var trainingModal = document.querySelector('#trainingData');
	var modal = new bootstrap.Modal(trainingModal);
	var delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
	
	$('.ip_address').mask('0ZZ.0ZZ.0ZZ.0ZZ', {
		translation: {
		'Z': {
			pattern: /[0-9]/, optional: true
		}
		}
	});

	function triggerModal() {
		getModule("configuracoes", "new_training_data.html")
			.then((response)=>{
				$('#modal-content').html(response);
			})
			.finally(()=>{
				modal.show();
			});
	}

	trainingModal.addEventListener('show.bs.modal', event => {		
		console.log("Modal Abriu")
	}, { once: true });

	trainingModal.addEventListener('hidden.bs.modal', event => {
		setModule("configuracoes")
	}, { once: true });

	function makeSanitazeSummary() {
		getSanitazeSummary()
			.then((response)=>{
				response.forEach(element => {
					let row = $('<tr />');

					$('<td />').text(element.track.label).appendTo(row);
					$('<td />').text(`${element.session.total_laps} Voltas`).appendTo(row);
					$('<td />').text(element.session.datetime).appendTo(row);
					$('<td />')
						.addClass("text-center")
						.html(`
							<button class="btn btn-danger btn-sm" type="button" onclick="deleteTraining('${element.track.id}', '${element.session.session_id}')">
								<i class="bi bi-trash"></i>
							</button>
						`)
						.appendTo(row);

					$(row).appendTo("#trained_data");
				});
			});
	}

	function deleteTraining(track, session) {
		console.log(track, session);
	}

	async function getSanitazeSummary() {
        return await window.pywebview.api.getSanitazeSummary();
