<nav aria-label="breadcrumb">
	<ol class="breadcrumb">
		<li class="breadcrumb-item active" aria-current="page">Histórico</li>		
		<li class="breadcrumb-item">
			<i class="bi bi-info-circle" 
				data-bs-toggle="tooltip" 
				data-bs-placement="top"
				data-bs-custom-class="custom-tooltip"
				data-bs-title="Sessões usadas para treinamento de dados não irão aparecer aqui">
			</i>
		</li>
	</ol>
	
</nav>
<div class="container-fluid mt-3">
	<div class="row">
		<div class="col">
			<table class="table">
				<thead>
					<tr>
						<th scope="row">Piloto</th>
						<th scope="row">Tipo de Sessão</th>
						<th scope="row" class="text-center">Voltas na Sessão</th>
						<th scope="row" data-bs-toggle="tooltip" data-bs-placement="top" data-bs-title="Data/Hora em que a sessão começou no seu computador">Data/Hora</th>
					</tr>
				</thead>
				<tbody id="main_table_body"></tbody>
			</table>			
		</div>
	</div>
</div>
<script>
	var tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
	var tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
</script>
<script>

	makeLapHistory();

	function makeLapHistory() {
		getLapHistory()
			.then((response)=>{
				response.forEach(element => {
					if (element.sessions.length == element.trained_sessions) return;

					let grp_row = `
						<tr>
							<td colspan="4" class="table-secondary fw-bold text-center">
								${element.track_label} <br>
								${element.trained_sessions > 0 ? `(${element.trained_sessions} ${element.trained_sessions > 1 ? "sessões" : "sessão"} usadas para treinos)` : ""}
							</td>
						</tr>
					`;										

					$(grp_row).appendTo("#main_table_body");

					element.sessions.forEach(item => {
						if (item.is_trained) return;

						let row = $('<tr />');						

						$('<td />').text(`${item.pilot_name}`).appendTo(row);
						$('<td />').text(`${item.sessionType}`).appendTo(row);
						$('<td />').text(`${item.laps.length} Voltas`).addClass("text-center").appendTo(row);
						$('<td />')
							.html(
								element.trained_sessions > 0 ?
								`<button class="btn btn-primary btn-sm btn-analisys float-end" type="button" onclick="openLapModule(${element.track_id}, '${item.session_id}')">
										Analisar Voltas
								</button>` : ""								
							)
							.appendTo(row);						

						$(row).appendTo("#main_table_body");
					})					
				});
			})
			.finally(()=>{
				$.session.clear();				
			})
	}

	async function getLapHistory() {
		let response = await window.pywebview.api.getLapHistory();

		return response;
	}

	function openLapModule(track, session) {
		$.session.set('TRACK', track);
		$.session.set('SESSION', session);

		setModule("lap_analisys");
	}

</script>
