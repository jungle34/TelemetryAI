<script>

	

	makeLapHistory();

	function makeLapHistory() {
		getLapHistory()
			.then((response)=>{
				response.forEach(element => {
					console.log(element)
					let grp_row = `
						<tr>
							<td colspan="4" class="table-secondary fw-bold text-center">${element.track_label}</td>
						</tr>
					`;

					$(grp_row).appendTo("#main_table_body");

					element.sessions.forEach(item => {
						let row = `
							<tr>
								<td>JOÃO FERREIRA</td>
								<td>${item.sessionType}</td>
								<td>${item.laps.length}</td>
								<td>-
									<button class="btn btn-primary btn-analisys float-end" type="button" onclick="openLapModule(${element.track_id}, '${item.session_id}')">
										Analisar Voltas
									</button>
								</td>
							</tr>
						`;

						$(row).appendTo("#main_table_body");
					})					
				});
			})
			.finally(()=>{
				$.session.clear();
				// $('.btn-analisys').hover(
				// 	function() {
				// 		console.log('hover init');
				// 	},
				// 	function() {
				// 		console.log('hover end');
				// 	}
				// );
			})
	}

	async function getLapHistory() {
		let response = await window.pywebview.api.getLapHistory();

		return response;
	}

	function openLapModule(track, session) {
		$.session.set('TRACK', track);
		$.session.set('SESSION', session);

		setModule("lap_analisys");
	}

</script>
